name: Update events (täglich)

on:
  schedule:
    - cron: "0 4 * * *"   # jeden Tag um 04:00 UTC (~06:00 München)
  workflow_dispatch: {}    # erlaubt manuelles Auslösen im GitHub-Tab "Actions"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Events holen
        env:
          TICKETMASTER_API_KEY: ${{ secrets.TICKETMASTER_API_KEY }}
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
        run: python scripts/fetch_events.py

      - name: events.json committen (falls geändert)
        run: |
          git config user.name "mucmeet-bot"
          git config user.email "actions@users.noreply.github.com"
          git add events.json
          if git diff --staged --quiet; then
            echo "Keine Änderungen."
          else
            git commit -m "Auto-Update Events $(date -u +%F)"
            git push
          fi
